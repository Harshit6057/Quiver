services:
  backend:
    image: node:20-alpine
    container_name: quiver-backend-dev
    working_dir: /app
    env_file:
      - .env
    environment:
      PORT: 5000
    command: sh -c "npm install; node --watch index.js"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: quiver-frontend-dev
    working_dir: /app
    env_file:
      - ./frontend/.env
    environment:
      VITE_API_URL: http://localhost:5000/api
    command: sh -c "npm install; npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_node_modules:
  frontend_node_modules:
