services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quiver-backend
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      PORT: 5000
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: quiver-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
